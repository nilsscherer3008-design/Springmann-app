<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00624B">
<title>Springmann · Bestellungen</title>
<style>
  :root{
    --red:#CD0039;
    --red-dark:#A3002E;
    --green:#00624B;
    --green-dark:#014435;
    --green-pale:#F0F7F3;
    --green-line:#D8E9E1;
    --gray:#7C8681;
    --cream:#FBFAF6;
    --ink:#20241F;
    --white:#ffffff;
    --radius-lg:26px;
    --radius-md:16px;
    --radius-sm:10px;
    --shadow: 0 6px 24px rgba(1,68,53,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    background-image:
      radial-gradient(circle at 100% 0%, rgba(205,0,57,0.05), transparent 40%),
      radial-gradient(circle at 0% 100%, rgba(0,98,75,0.06), transparent 45%);
    font-family:-apple-system,'Segoe UI',Roboto,system-ui,Helvetica,Arial,sans-serif;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:640px;margin:0 auto;padding:0 0 60px;}

  /* Header */
  header.top{
    background:linear-gradient(180deg, var(--green-dark) 0%, var(--green) 100%);
    padding:22px 20px 26px;
    border-radius:0 0 28px 28px;
    box-shadow:0 8px 28px rgba(1,68,53,0.25);
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:"";
    position:absolute; right:-40px; top:-60px;
    width:180px; height:180px;
    background:rgba(255,255,255,0.05);
    border-radius:60% 40% 55% 45% / 45% 55% 40% 60%;
  }
  .logo-row{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
  .logo-row img{height:52px;width:auto;display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.25));}
  .brandtext{color:var(--white);}
  .brandtext .app-name{font-family:Georgia,'Iowan Old Style','Palatino Linotype',ui-serif,serif;font-weight:600;font-size:1.15rem;letter-spacing:.2px;line-height:1.1;}
  .brandtext .app-sub{font-size:.72rem;color:#CFE7DC;letter-spacing:.4px;margin-top:2px;}

  nav.tabs{
    display:flex; gap:8px; margin-top:20px; position:relative; z-index:1;
    background:rgba(255,255,255,0.12);
    padding:5px; border-radius:14px;
  }
  nav.tabs button{
    flex:1; border:none; background:transparent; color:#E4F2EC;
    padding:10px 8px; font-family:-apple-system,'Segoe UI',Roboto,system-ui,Helvetica,Arial,sans-serif; font-weight:600; font-size:.85rem;
    border-radius:10px; cursor:pointer; transition:.2s;
  }
  nav.tabs button.active{background:var(--white); color:var(--green-dark); box-shadow:0 3px 10px rgba(0,0,0,0.15);}

  main{padding:22px 18px 0;}

  h2.section-title{
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',ui-serif,serif; font-weight:600; font-size:1.3rem; color:var(--green-dark);
    margin:4px 0 16px; display:flex; align-items:center; gap:8px;
  }
  h2.section-title .petal{
    width:11px;height:11px;background:var(--red);
    border-radius:60% 40% 55% 45% / 45% 55% 40% 60%; display:inline-block;
  }

  .card{
    background:var(--white); border-radius:var(--radius-lg);
    box-shadow:var(--shadow); padding:20px; margin-bottom:18px;
    border:1px solid rgba(1,68,53,0.06);
  }

  label.field-label{
    display:block; font-size:.72rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.6px; color:var(--green-dark); margin-bottom:6px;
  }
  .field{margin-bottom:16px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  input[type=text], input[type=date], input[type=number]{
    width:100%; padding:12px 14px; border-radius:var(--radius-sm);
    border:1.5px solid #E1E6E2; background:var(--cream);
    font-family:-apple-system,'Segoe UI',Roboto,system-ui,Helvetica,Arial,sans-serif; font-size:.95rem; color:var(--ink);
    transition:.15s;
  }
  input:focus{outline:none; border-color:var(--green); background:var(--white); box-shadow:0 0 0 3px rgba(0,98,75,0.12);}
  input::placeholder{color:#A6ADA8;}

  .item-card{
    border:1.5px dashed var(--green-line); border-radius:var(--radius-md);
    padding:16px; margin-bottom:14px; position:relative; background:var(--green-pale);
  }
  .item-card .item-header{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
  }
  .item-card .item-title{font-weight:700; color:var(--green-dark); font-size:.85rem; letter-spacing:.3px;}
  .remove-item{
    border:none; background:none; color:var(--red); font-size:.78rem; font-weight:600;
    cursor:pointer; padding:4px 8px; border-radius:8px;
  }
  .remove-item:hover{background:rgba(205,0,57,0.08);}

  .photo-frame{
    width:100%; aspect-ratio:4/3; border-radius:var(--radius-md);
    border:2px solid var(--white); background:var(--white);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    cursor:pointer; overflow:hidden; position:relative;
    box-shadow:inset 0 0 0 1.5px var(--green-line);
    margin-bottom:14px;
  }
  .photo-frame img{width:100%; height:100%; object-fit:cover;}
  .photo-frame .placeholder{color:var(--gray); text-align:center; padding:10px;}
  .photo-frame .placeholder svg{width:34px;height:34px;color:var(--green); margin-bottom:6px;}
  .photo-frame .placeholder .txt{font-size:.78rem; font-weight:600;}
  .photo-frame .retake{
    position:absolute; bottom:8px; right:8px; background:rgba(1,68,53,0.85); color:#fff;
    font-size:.68rem; font-weight:600; padding:5px 10px; border-radius:20px;
  }
  .item-card input[type=file]{display:none;}

  .btn{
    width:100%; padding:14px; border-radius:var(--radius-sm); border:none;
    font-family:-apple-system,'Segoe UI',Roboto,system-ui,Helvetica,Arial,sans-serif; font-weight:700; font-size:.9rem; letter-spacing:.2px;
    cursor:pointer; transition:.15s; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active{transform:scale(0.98);}
  .btn-outline{background:var(--white); color:var(--green-dark); border:1.5px solid var(--green); margin-bottom:12px;}
  .btn-outline:hover{background:var(--green-pale);}
  .btn-primary{background:linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%); color:#fff; box-shadow:0 6px 16px rgba(205,0,57,0.28);}
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-small{padding:9px 14px; font-size:.78rem; width:auto;}
  .btn-ghost{background:var(--green-pale); color:var(--green-dark);}

  /* History tab */
  .search-wrap{margin-bottom:16px;}
  .customer-group{margin-bottom:14px;}
  .customer-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; background:var(--white); border-radius:var(--radius-md);
    box-shadow:var(--shadow); cursor:pointer; border:1px solid rgba(1,68,53,0.06);
  }
  .customer-header .name{font-family:Georgia,'Iowan Old Style','Palatino Linotype',ui-serif,serif; font-weight:600; color:var(--green-dark); font-size:1.02rem;}
  .customer-header .count{font-size:.72rem; color:var(--gray); font-weight:600;}
  .customer-header .chevron{transition:.2s; color:var(--green);}
  .customer-group.open .chevron{transform:rotate(180deg);}
  .orders-list{max-height:0; overflow:hidden; transition:max-height .25s ease;}
  .customer-group.open .orders-list{max-height:4000px;}
  .order-item{
    background:var(--white); margin:8px 4px 0; padding:14px 16px; border-radius:var(--radius-md);
    border:1px solid var(--green-line); border-left:4px solid var(--red);
  }
  .order-item .order-date{font-size:.72rem; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:.4px; margin-bottom:8px;}
  .order-article{display:flex; gap:10px; align-items:center; padding:6px 0; border-top:1px dashed var(--green-line);}
  .order-article:first-of-type{border-top:none;}
  .order-article .thumb{width:44px;height:44px;border-radius:9px;object-fit:cover;background:var(--green-pale); flex-shrink:0;}
  .order-article .thumb.empty{display:flex;align-items:center;justify-content:center;color:var(--green); font-size:.65rem;}
  .order-article .meta{font-size:.82rem; line-height:1.35;}
  .order-article .meta b{color:var(--ink);}
  .order-article .meta .sub{color:var(--gray); font-size:.74rem;}
  .order-actions{margin-top:10px;}

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--gray);
  }
  .empty-state svg{width:52px;height:52px;color:var(--green-line); margin-bottom:10px;}
  .empty-state .t{font-family:Georgia,'Iowan Old Style','Palatino Linotype',ui-serif,serif; color:var(--green-dark); font-weight:600; font-size:1.05rem; margin-bottom:4px;}

  .toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(140%);
    background:var(--green-dark); color:#fff; padding:14px 22px; border-radius:30px;
    font-weight:600; font-size:.85rem; box-shadow:0 10px 30px rgba(0,0,0,0.25);
    transition:transform .3s cubic-bezier(.2,.9,.3,1.2); z-index:50; display:flex; align-items:center; gap:8px;
    max-width:90%;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,20,15,0.7); z-index:100;
    display:none; align-items:center; justify-content:center; padding:24px;
  }
  .modal-overlay.show{display:flex;}
  .modal-overlay img{max-width:100%; max-height:80vh; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,0.4);}

  .hint{font-size:.72rem; color:var(--gray); margin-top:-8px; margin-bottom:16px; line-height:1.4;}

  @media (max-width:380px){
    .row2{grid-template-columns:1fr;}
  }
</style>
</head>

<script>
// ---------- Speicher-Kompatibilität ----------
// window.storage gibt es nur innerhalb der Claude-Oberfläche.
// Läuft die App eigenständig (z. B. lokal geöffnet oder via GitHub Pages),
// wird hier ein Ersatz auf Basis von localStorage aktiviert, damit
// Bestellungen trotzdem dauerhaft im Browser gespeichert werden – auch offline.
if (!window.storage) {
  window.storage = {
    async get(key, shared){
      const v = localStorage.getItem(key);
      if(v === null) return null;
      return { key, value: v, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem(key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      const existed = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return { key, deleted: existed, shared: !!shared };
    },
    async list(prefix, shared){
      const p = prefix || '';
      const keys = Object.keys(localStorage).filter(k => k.startsWith(p));
      return { keys, prefix: prefix, shared: !!shared };
    }
  };
}

// ---------- State ----------
let itemCounter = 0;
const photoStore = {}; // itemId -> dataURL (compressed)
let storageAvailable = true;

function uid(){ return 'it_' + (++itemCounter) + '_' + Math.random().toString(36).slice(2,7); }

// ---------- Init ----------
document.getElementById('orderDate').valueAsDate = new Date();
addItem();

document.getElementById('addItemBtn').addEventListener('click', ()=>addItem());
document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);
document.getElementById('tabNewBtn').addEventListener('click', ()=>switchTab('new'));
document.getElementById('tabHistBtn').addEventListener('click', ()=>switchTab('hist'));
document.getElementById('modalOverlay').addEventListener('click', ()=>{
  document.getElementById('modalOverlay').classList.remove('show');
});
document.getElementById('searchCustomer').addEventListener('input', renderHistory);

function switchTab(tab){
  document.getElementById('viewNew').style.display = tab==='new' ? '' : 'none';
  document.getElementById('viewHist').style.display = tab==='hist' ? '' : 'none';
  document.getElementById('tabNewBtn').classList.toggle('active', tab==='new');
  document.getElementById('tabHistBtn').classList.toggle('active', tab==='hist');
  if(tab==='hist') loadHistory();
}

// ---------- Item cards ----------
function addItem(){
  const id = uid();
  const container = document.getElementById('itemsContainer');
  const div = document.createElement('div');
  div.className = 'item-card';
  div.dataset.id = id;
  div.innerHTML = `
    <div class="item-header">
      <span class="item-title">ARTIKEL</span>
      <button type="button" class="remove-item">Entfernen</button>
    </div>
    <div class="photo-frame" data-role="photoframe">
      <div class="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7h3l1.5-2h7L17 7h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.5"/></svg>
        <div class="txt">Foto aufnehmen</div>
      </div>
    </div>
    <input type="file" accept="image/*" capture="environment" data-role="fileinput">
    <div class="field" style="margin-bottom:12px;">
      <label class="field-label">Menge</label>
      <input type="number" min="1" step="1" placeholder="z. B. 10" data-role="qty">
    </div>
    <div class="field" style="margin-bottom:0;">
      <label class="field-label">Farbe / Variation <span style="text-transform:none;font-weight:400;color:var(--gray);">(optional)</span></label>
      <input type="text" placeholder="z. B. Rot, Sorte XY" data-role="variant">
    </div>
  `;
  container.appendChild(div);

  const frame = div.querySelector('[data-role="photoframe"]');
  const fileInput = div.querySelector('[data-role="fileinput"]');
  frame.addEventListener('click', ()=>fileInput.click());
  fileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    compressImage(file, 900, 0.72).then(dataUrl=>{
      photoStore[id] = dataUrl;
      frame.innerHTML = `<img src="${dataUrl}"><span class="retake">Erneut aufnehmen</span>`;
    });
  });
  div.querySelector('.remove-item').addEventListener('click', ()=>{
    const cards = document.querySelectorAll('.item-card');
    if(cards.length <= 1){
      showToast('Mindestens ein Artikel ist erforderlich.');
      return;
    }
    delete photoStore[id];
    div.remove();
  });
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ---------- ZIP (minimaler, eigenständiger ZIP-Schreiber, ohne Internet/Bibliothek) ----------
function crc32(buf){
  if(!crc32.table){
    const t = [];
    for(let n=0;n<256;n++){
      let c = n;
      for(let k=0;k<8;k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      t[n] = c;
    }
    crc32.table = t;
  }
  let crc = 0 ^ (-1);
  for(let i=0;i<buf.length;i++) crc = (crc >>> 8) ^ crc32.table[(crc ^ buf[i]) & 0xFF];
  return (crc ^ (-1)) >>> 0;
}

function dosDateTime(d){
  d = d || new Date();
  const dosTime = ((d.getHours() & 0x1F) << 11) | ((d.getMinutes() & 0x3F) << 5) | ((Math.floor(d.getSeconds()/2)) & 0x1F);
  const dosDate = (((d.getFullYear()-1980) & 0x7F) << 9) | (((d.getMonth()+1) & 0xF) << 5) | (d.getDate() & 0x1F);
  return {dosTime, dosDate};
}

function createZip(files){ // files: [{name, data:Uint8Array}]
  const enc = new TextEncoder();
  const localParts = [], centralParts = [];
  let offset = 0;
  const {dosTime, dosDate} = dosDateTime();

  files.forEach(f=>{
    const nameBytes = enc.encode(f.name);
    const data = f.data;
    const crc = crc32(data);
    const size = data.length;

    const lh = new Uint8Array(30 + nameBytes.length);
    const lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0, true);
    lv.setUint16(8, 0, true);
    lv.setUint16(10, dosTime, true);
    lv.setUint16(12, dosDate, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true);
    lv.setUint32(22, size, true);
    lv.setUint16(26, nameBytes.length, true);
    lv.setUint16(28, 0, true);
    lh.set(nameBytes, 30);
    localParts.push(lh, data);

    const ch = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, dosTime, true);
    cv.setUint16(14, dosDate, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    ch.set(nameBytes, 46);
    centralParts.push(ch);

    offset += lh.length + data.length;
  });

  const centralSize = centralParts.reduce((s,p)=>s+p.length,0);
  const centralOffset = offset;
  const end = new Uint8Array(22);
  const ev = new DataView(end.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);

  return new Blob([...localParts, ...centralParts, end], {type:'application/zip'});
}

function dataUrlToUint8Array(dataUrl){
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

// ---------- CSV ----------
function csvEscape(val){
  val = (val === undefined || val === null) ? '' : String(val);
  if(/[;"\n]/.test(val)){
    val = '"' + val.replace(/"/g,'""') + '"';
  }
  return val;
}

function safeFileBase(order){
  const safeName = (order.customer || 'Kunde').replace(/[^a-zA-Z0-9äöüÄÖÜß _-]/g,'').trim().replace(/\s+/g,'_');
  return `Bestellung_${safeName}_${order.date}`;
}

function buildCsv(order){
  const rows = [['Kundenname','Datum','Artikel Nr.','Menge','Farbe/Variation','Foto-Datei']];
  order.items.forEach((it, idx)=>{
    const photoName = it.hasPhoto ? `Foto_${idx+1}.jpg` : '';
    rows.push([order.customer, order.date, idx+1, it.qty, it.variant || '', photoName]);
  });
  const body = rows.map(r=>r.map(csvEscape).join(';')).join('\r\n');
  return '\uFEFF' + body; // BOM for Excel/Umlaute
}

function triggerDownload(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

function downloadCsvOnly(order){
  const csv = buildCsv(order);
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  triggerDownload(blob, `${safeFileBase(order)}.csv`);
}

function downloadBundle(order){
  const hasAnyPhoto = order.items.some(it=>it.hasPhoto);
  if(!hasAnyPhoto){
    downloadCsvOnly(order);
    return;
  }
  const enc = new TextEncoder();
  const csvText = buildCsv(order);
  const files = [{ name: `${safeFileBase(order)}.csv`, data: enc.encode(csvText) }];
  order.items.forEach((it, idx)=>{
    if(it.hasPhoto && it.photo){
      files.push({ name: `Foto_${idx+1}.jpg`, data: dataUrlToUint8Array(it.photo) });
    }
  });
  const zipBlob = createZip(files);
  triggerDownload(zipBlob, `${safeFileBase(order)}.zip`);
}

// ---------- Submit ----------
async function submitOrder(){
  const customer = document.getElementById('customerName').value.trim();
  const date = document.getElementById('orderDate').value;
  if(!customer){ showToast('Bitte Kundennamen eingeben.'); return; }
  if(!date){ showToast('Bitte Datum eingeben.'); return; }

  const cards = document.querySelectorAll('.item-card');
  const items = [];
  for(const card of cards){
    const id = card.dataset.id;
    const qty = card.querySelector('[data-role="qty"]').value;
    const variant = card.querySelector('[data-role="variant"]').value.trim();
    if(!qty || Number(qty) <= 0){
      showToast('Bitte bei jedem Artikel eine Menge angeben.');
      return;
    }
    items.push({
      qty: Number(qty),
      variant: variant,
      photo: photoStore[id] || null,
      hasPhoto: !!photoStore[id]
    });
  }

  const order = {
    id: 'order_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    customer, date, items,
    createdAt: new Date().toISOString()
  };

  downloadBundle(order);

  try{
    const key = 'orders:' + customer.toLowerCase().replace(/\s+/g,'_') + ':' + order.id;
    await window.storage.set(key, JSON.stringify(order), true);
  }catch(err){
    storageAvailable = false;
    console.error('Storage error', err);
  }

  const hasPhotoAny = order.items.some(it=>it.hasPhoto);
  showToast(hasPhotoAny ? 'Bestellung gespeichert & ZIP (CSV + Fotos) heruntergeladen ✓' : 'Bestellung gespeichert & CSV heruntergeladen ✓');
  resetForm();
}

function resetForm(){
  document.getElementById('customerName').value = '';
  document.getElementById('orderDate').valueAsDate = new Date();
  document.getElementById('itemsContainer').innerHTML = '';
  Object.keys(photoStore).forEach(k=>delete photoStore[k]);
  addItem();
}

// ---------- Toast ----------
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}

// ---------- History ----------
let allOrdersCache = [];

async function loadHistory(){
  const list = document.getElementById('historyList');
  list.innerHTML = '<div class="empty-state">Lade Bestellungen…</div>';
  try{
    const res = await window.storage.list('orders:', true);
    const keys = (res && res.keys) ? res.keys : [];
    const orders = [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value) orders.push(JSON.parse(r.value));
      }catch(e){ /* skip missing */ }
    }
    allOrdersCache = orders;
    renderHistory();
  }catch(err){
    console.error(err);
    list.innerHTML = '<div class="empty-state"><div class="t">Speicher nicht verfügbar</div>Bestellungen können momentan nicht geladen werden.</div>';
  }
}

function renderHistory(){
  const list = document.getElementById('historyList');
  const q = (document.getElementById('searchCustomer').value || '').toLowerCase();

  if(allOrdersCache.length === 0){
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M4 7h16M6 7l1 13h10l1-13M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
      <div class="t">Noch keine Bestellungen</div>
      Abgeschlossene Bestellungen erscheinen hier, sortiert nach Kunde.
    </div>`;
    return;
  }

  const groups = {};
  allOrdersCache.forEach(o=>{
    const key = o.customer;
    if(!groups[key]) groups[key] = [];
    groups[key].push(o);
  });

  let names = Object.keys(groups).sort((a,b)=>a.localeCompare(b,'de',{sensitivity:'base'}));
  if(q) names = names.filter(n=>n.toLowerCase().includes(q));

  if(names.length === 0){
    list.innerHTML = `<div class="empty-state"><div class="t">Kein Treffer</div>Kein Kunde mit diesem Namen gefunden.</div>`;
    return;
  }

  list.innerHTML = '';
  names.forEach(name=>{
    const orders = groups[name].sort((a,b)=> (b.date||'').localeCompare(a.date||''));
    const groupDiv = document.createElement('div');
    groupDiv.className = 'customer-group';
    groupDiv.innerHTML = `
      <div class="customer-header">
        <span class="name">${escapeHtml(name)}</span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span class="count">${orders.length} Bestellung${orders.length>1?'en':''}</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </span>
      </div>
      <div class="orders-list"></div>
    `;
    const ordersListEl = groupDiv.querySelector('.orders-list');
    orders.forEach(o=>{
      const oDiv = document.createElement('div');
      oDiv.className = 'order-item';
      let articlesHtml = '';
      o.items.forEach((it, idx)=>{
        const thumb = it.photo
          ? `<img class="thumb" src="${it.photo}" data-full="${it.photo}">`
          : `<div class="thumb empty">kein Foto</div>`;
        articlesHtml += `
          <div class="order-article">
            ${thumb}
            <div class="meta">
              <b>Artikel ${idx+1}</b> · Menge: ${escapeHtml(String(it.qty))}
              ${it.variant ? `<div class="sub">${escapeHtml(it.variant)}</div>` : ''}
            </div>
          </div>`;
      });
      oDiv.innerHTML = `
        <div class="order-date">${formatDate(o.date)}</div>
        ${articlesHtml}
        <div class="order-actions">
          <button class="btn btn-ghost btn-small" data-action="csv">${o.items.some(it=>it.hasPhoto) ? 'ZIP (CSV + Fotos) erneut herunterladen' : 'CSV erneut herunterladen'}</button>
        </div>
      `;
      oDiv.querySelector('[data-action="csv"]').addEventListener('click', ()=>downloadBundle(o));
      oDiv.querySelectorAll('img.thumb').forEach(img=>{
        img.addEventListener('click', ()=>{
          document.getElementById('modalImg').src = img.dataset.full;
          document.getElementById('modalOverlay').classList.add('show');
        });
      });
      ordersListEl.appendChild(oDiv);
    });
    groupDiv.querySelector('.customer-header').addEventListener('click', ()=>{
      groupDiv.classList.toggle('open');
    });
    list.appendChild(groupDiv);
  });
}

function formatDate(d){
  if(!d) return '';
  const parts = d.split('-');
  if(parts.length !== 3) return d;
  return `${parts[2]}.${parts[1]}.${parts[0]}`;
}

function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}
